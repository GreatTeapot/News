version: '3.8'
name: docker_news

services:
  postgres:
    image: postgres:15
    container_name: postgres_news
    ports:
      - "5437:5432"
    env_file:
      - .env-non-dev
    volumes:
      - .postgres:/var/lib/postgres/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 10s
      retries: 5
    # restart: unless-stopped

  app:
    image: news_app
    build:
      context: .
    env_file:
      - .env-non-dev
    container_name: news_app
    depends_on:
      - postgres
    command: ["/bin/bash","/app/docker-d/new.sh"]
    ports:
      - 8000:8000





